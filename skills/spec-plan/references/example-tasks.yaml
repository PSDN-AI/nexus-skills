# Example tasks.yaml — Frontend E-Commerce Domain
#
# This is a complete worked example showing all required fields
# and demonstrating task decomposition, dependency ordering,
# parallelization strategy, and acceptance criteria mapping.
#
# Domain: Frontend for an e-commerce platform
# Tasks: 6 tasks across 4 phases
# Parallelization: 3 tasks run in parallel in phase 3

version: "0.1.0"
domain: "frontend"
generated_at: "2026-01-15T12:00:00Z"
generated_from:
  spec: "frontend/spec.md"
  boundary: "frontend/boundary.yaml"
  contracts:
    - "contracts/api-contracts.yaml"

tasks:
  - id: FE-001
    name: "Project scaffolding and build configuration"
    depends_on: []
    estimated_complexity: low
    files_touched:
      - "package.json"
      - "tsconfig.json"
      - "vite.config.ts"
      - "tailwind.config.ts"
      - "src/main.tsx"
      - "src/App.tsx"
      - "index.html"
    acceptance_criteria: []
    prompt_context: |
      Set up a new React 18 + TypeScript project using Vite as the build
      tool. Configure Tailwind CSS for styling, React Router for navigation,
      and Zustand for state management. Target initial bundle size under
      500KB. Create the base App component with router outlet and main layout.
      Include scripts for dev, build, and preview in package.json.

  - id: FE-002
    name: "Shared UI component library"
    depends_on:
      - FE-001
    estimated_complexity: medium
    files_touched:
      - "src/components/ui/Button.tsx"
      - "src/components/ui/Input.tsx"
      - "src/components/ui/Modal.tsx"
      - "src/components/ui/Toast.tsx"
      - "src/components/ui/Spinner.tsx"
      - "src/components/ui/Navbar.tsx"
      - "src/components/ui/index.ts"
    acceptance_criteria:
      - AC-008
    prompt_context: |
      Create a shared UI component library with: Button (primary, secondary,
      danger variants), Input (text, email, password with validation states),
      Modal (dialog with backdrop, close on escape), Toast (success, error,
      info notifications), Loading Spinner, and Navigation bar with cart
      icon slot. All components must meet WCAG 2.1 AA: proper ARIA labels,
      keyboard navigation, sufficient color contrast. Use Tailwind CSS.
      Export all from a barrel index file.

  - id: FE-003
    name: "Product listing page with filtering and sorting"
    depends_on:
      - FE-002
    estimated_complexity: medium
    files_touched:
      - "src/pages/ProductList.tsx"
      - "src/components/ProductCard.tsx"
      - "src/components/ProductFilters.tsx"
      - "src/hooks/useProducts.ts"
      - "src/types/product.ts"
    acceptance_criteria:
      - AC-001
      - AC-002
    prompt_context: |
      Build the product listing page. Display products in a responsive grid:
      4 columns on desktop, 2 on tablet, 1 on mobile. Each ProductCard shows
      image, name, price, and "Add to Cart" button. Implement:
      - Category filter sidebar (checkbox list from GET /api/v1/categories)
      - Sort dropdown: price low-high, price high-low, popularity
      - Pagination: 12 products per page
      Use a custom useProducts hook for data fetching. Define Product type
      in types/product.ts matching the API response schema.

  - id: FE-004
    name: "Product detail page with gallery and reviews"
    depends_on:
      - FE-002
    estimated_complexity: medium
    files_touched:
      - "src/pages/ProductDetail.tsx"
      - "src/components/ImageGallery.tsx"
      - "src/components/ProductSelectors.tsx"
      - "src/components/ReviewSection.tsx"
      - "src/components/RelatedProducts.tsx"
    acceptance_criteria:
      - AC-003
    prompt_context: |
      Build the product detail page at /products/:id. Fetch product data
      from GET /api/v1/products/:id. Include:
      - ImageGallery: thumbnail strip + main image, click to switch
      - ProductSelectors: size dropdown, color swatches, quantity +/- picker
      - ReviewSection: star rating display, review list, pagination
      - RelatedProducts: horizontal scroll carousel, 4 visible at a time
      - "Add to Cart" button that adds selected variant and quantity

  - id: FE-005
    name: "Shopping cart with localStorage persistence"
    depends_on:
      - FE-002
    estimated_complexity: medium
    files_touched:
      - "src/store/cartStore.ts"
      - "src/components/CartDrawer.tsx"
      - "src/components/CartIcon.tsx"
      - "src/hooks/useCart.ts"
    acceptance_criteria:
      - AC-004
      - AC-005
    prompt_context: |
      Implement the shopping cart with Zustand. Create cartStore with:
      - items array (productId, name, price, quantity, variant)
      - addItem, removeItem, updateQuantity, clearCart actions
      - Persist to localStorage (Zustand persist middleware)
      - Do NOT store PII in localStorage
      CartIcon in the Navbar shows item count badge. CartDrawer slides
      in from the right showing items, quantities (editable), per-item
      totals, and cart total. "Proceed to Checkout" button.

  - id: FE-006
    name: "Multi-step checkout flow with Stripe integration"
    depends_on:
      - FE-005
    estimated_complexity: high
    files_touched:
      - "src/pages/Checkout.tsx"
      - "src/components/checkout/ShippingForm.tsx"
      - "src/components/checkout/PaymentForm.tsx"
      - "src/components/checkout/OrderReview.tsx"
      - "src/components/checkout/Confirmation.tsx"
      - "src/hooks/useCheckout.ts"
    acceptance_criteria:
      - AC-006
      - AC-007
    prompt_context: |
      Build a 4-step checkout flow at /checkout:
      1. ShippingForm: name, address, city, state, zip, country fields.
         Validate all fields before "Continue" is enabled.
      2. PaymentForm: Stripe Elements for card input. Uses the backend
         POST /api/v1/orders endpoint to create a PaymentIntent.
      3. OrderReview: summary of items, shipping address, payment method.
         "Place Order" button triggers payment confirmation.
      4. Confirmation: order number, estimated delivery, "Continue Shopping".
      Use useCheckout hook for step navigation and API calls. Show a
      progress indicator (step 1 of 4, step 2 of 4, etc.).

# Execution plan: tasks ordered into phases with parallelization decisions

execution_plan:
  - phase: 1
    tasks:
      - FE-001
    parallel: false
    reason: "Scaffolding must complete before any component work"

  - phase: 2
    tasks:
      - FE-002
    parallel: false
    reason: "Shared components are dependencies for all page-level tasks"

  - phase: 3
    tasks:
      - FE-003
      - FE-004
      - FE-005
    parallel: true
    reason: "No overlapping files_touched -- safe to parallelize"

  - phase: 4
    tasks:
      - FE-006
    parallel: false
    reason: "Checkout depends on cart store from FE-005"

# Validation summary for downstream tools

validation:
  total_tasks: 6
  total_phases: 4
  parallelizable_tasks: 3
  acceptance_criteria_mapped: 9
  acceptance_criteria_unmapped: 1
  unmapped_criteria:
    - AC-010
  files_conflict_check: pass
  spec_coverage: "95%"
