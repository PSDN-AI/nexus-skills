    prompt_context: |
      Create PostgreSQL migrations for the three core tables: users, products,
      and orders. Each migration file must be idempotent (using IF NOT EXISTS).
      Schema requirements:
      - users: id (UUID PK), email (VARCHAR 255 UNIQUE NOT NULL), password_hash
        (VARCHAR 255 NOT NULL), created_at (TIMESTAMPTZ DEFAULT NOW()).
      - products: id (UUID PK), name (VARCHAR 255 NOT NULL), price_cents (INT NOT NULL),
        image_url (TEXT), created_at (TIMESTAMPTZ DEFAULT NOW()).
      - orders: id (UUID PK), user_id (UUID FK -> users.id), status
        (VARCHAR 50 NOT NULL DEFAULT 'pending'), created_at (TIMESTAMPTZ DEFAULT NOW()).
      Produce a consolidated `db/schema.sql` that applies all migrations in order.
      All migrations must pass `psql --dry-run` (i.e., `psql -f schema.sql` on an
      empty database must exit 0).

  - id: BE-002
    name: "Authentication service (register, login, JWT)"
    depends_on:
