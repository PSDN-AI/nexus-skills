      - GET  /api/v1/products        — list all products (array of Product objects)
      - GET  /api/v1/products/:id    — fetch a single product by UUID; 404 if not found
      - POST /api/v1/products        — create a product (requires requireAuth middleware)
      - PUT  /api/v1/products/:id    — update a product (requires requireAuth middleware)
      - DELETE /api/v1/products/:id  — delete a product (requires requireAuth middleware)
      Define the Product TypeScript type in `product.types.ts`. Write-operations
      must validate the request body with zod and return 422 with field-level errors
      on validation failure. This task may be worked in parallel with BE-002.

