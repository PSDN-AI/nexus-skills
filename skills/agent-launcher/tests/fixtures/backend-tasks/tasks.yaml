      - "src/auth/auth.controller.ts"
      - "src/auth/auth.router.ts"
      - "src/auth/jwt.ts"
      - "src/middleware/require_auth.ts"
    acceptance_criteria:
      - AC-003
      - AC-004
      - AC-005
    prompt_context: |
      Implement a stateless JWT authentication service on top of the users table
      created in BE-001. Required endpoints:
      - POST /api/v1/auth/register: accepts { email, password }, hashes the
        password with bcrypt (cost 12), inserts the user, returns a signed JWT.
      - POST /api/v1/auth/login: accepts { email, password }, verifies credentials,
        returns a signed JWT on success or 401 on failure.
      JWT payload must include { sub: userId, email, iat, exp }. Token expiry is
      24 hours. Implement `requireAuth` Express middleware that validates the
      Authorization: Bearer <token> header and attaches `req.user` to the request.
      This task may be worked in parallel with BE-003.

